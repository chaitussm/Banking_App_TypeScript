
name: Playwright Pipeline

on:
  push:
    branches:
      - master
  schedule:
    # 11:01 PM IST = 5:31 PM UTC
    - cron: '31 17 * * *'
  workflow_dispatch:

jobs:

  test-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/
          if-no-files-found: warn

      - name: Send Playwright HTML report via email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Playwright Test Report - ${{ github.sha }}
          to: chaitanyassm@outlook.com
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            <p>Playwright test run completed. See the attached HTML report.</p>
          attachments: playwright-report/index.html

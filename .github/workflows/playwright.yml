name: Playwright Pipeline
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: get-playwright-version
        run: echo "version=$(npx --no-install playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright Chromium browser
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright/chromium
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ steps.get-playwright-version.outputs.version }}
          restore-keys: |
            playwright-chromium-${{ runner.os }}-
            playwright-chromium-

      - name: Install Playwright Chromium (if cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Download migration files from backend repo
        run: |
          set -e
          mkdir -p db/migrations
          curl -L -H "Authorization: token ${{ secrets.BANKING_APP_TOKEN }}" -o db/migrations/001_create_schema.sql https://raw.githubusercontent.com/chaitussm/Banking_Application/master/backend/db/migrations/001_create_schema.sql
          curl -L -H "Authorization: token ${{ secrets.BANKING_APP_TOKEN }}" -o db/migrations/002_seed_initial_data.sql https://raw.githubusercontent.com/chaitussm/Banking_Application/master/backend/db/migrations/002_seed_initial_data.sql

      - name: Set DB_PATH environment variable
        run: echo "DB_PATH=banking.sqlite" >> $GITHUB_ENV

      - name: Initialize and seed SQLite database
        run: |
          sqlite3 banking.sqlite < db/migrations/001_create_schema.sql
          sqlite3 banking.sqlite < db/migrations/002_seed_initial_data.sql

      - name: Fetch frontend-build artifact from Banking_Application
        run: |
          npm install node-fetch@2 unzipper
          node scripts/fetch-artifact.js chaitussm Banking_Application dev-pipeline.yml frontend-build ${{ secrets.BANKING_APP_TOKEN }}

      - name: Move extracted frontend build to frontend/dist
        run: |
          mkdir -p frontend/dist
          shopt -s dotglob nullglob
          mv frontend-build/* frontend/dist/

      - name: Fetch backend-build artifact from Banking_Application
        run: |
          node scripts/fetch-artifact.js chaitussm Banking_Application dev-pipeline.yml backend-build ${{ secrets.BANKING_APP_TOKEN }}

      - name: Install backend dependencies
        run: |
          cd backend-build && npm ci --prefer-offline --no-audit --progress=false


      - name: Start backend server
        run: |
          cd backend-build && nohup npm start > ../backend.log 2>&1 &

      - name: Print backend log after backend start
        run: cat backend.log || echo 'No backend.log found.'

      - name: List node processes after backend start
        run: ps aux | grep node

      - name: List open ports after backend start
        run: sudo netstat -tuln || sudo lsof -i -P -n


      - name: Wait for backend to be ready
        run: npx wait-on --timeout=120000 http://localhost:4000/health

      - name: Print backend log after wait-on
        run: cat backend.log || echo 'No backend.log found.'

      - name: List node processes after backend start
        run: ps aux | grep node

      - name: Install static server
        run: npm install -g serve



      - name: List frontend/dist before starting server
        run: |
          echo "Contents of frontend/dist before starting server:"
          ls -l frontend/dist || echo 'frontend/dist not found.'
          if [ -d frontend/dist ]; then
            ls -lR frontend/dist
          fi


      - name: Check serve version
        run: serve --version

      - name: Start frontend server (foreground for debug)
        run: serve -l 5173 frontend/dist --single
        continue-on-error: true


      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_CHROMIUM_ARGS: --no-sandbox

      - name: Zip all test reports and artifacts
        if: always()
        run: |
          mkdir -p test-reports
          [ -d playwright-report ] && cp -r playwright-report test-reports/
          [ -d test-results ] && cp -r test-results test-reports/
          zip -r test-reports.zip test-reports

      - name: Upload all test reports and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: all-test-reports
          path: test-reports.zip
          if-no-files-found: warn

      - name: Send Playwright HTML report via email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: Playwright Test Report - ${{ github.sha }}
          to: chaitanyassm@outlook.com
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            <p>Playwright test run completed. See the attached HTML report.</p>
          attachments: playwright-report/index.html

name: Playwright E2E Tests

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: backend

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend server
        working-directory: backend
        run: nohup node src/server.js &

      - name: Serve frontend
        run: npx serve -l 5174 frontend/dist &

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:5174/login
          npx wait-on http://localhost:3000/api/health || true

      - name: Install Playwright dependencies
        run: npm ci

      - name: Run custom test runner script
        run: node scripts/test-runner.js

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore